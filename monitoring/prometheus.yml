# monitoring/prometheus.yml — Prometheus scrape configuration

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: "production"
    platform: "hft_vietnam"

# ── Alerting rules ────────────────────────────────────────────────────────────
rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []  # Add alertmanager endpoint in production

# ── Scrape configs ────────────────────────────────────────────────────────────
scrape_configs:
  # FastAPI backend — custom business metrics
  - job_name: "hft_backend"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: "/metrics"
    scrape_interval: 10s

  # TimescaleDB (postgres_exporter)
  - job_name: "timescaledb"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  # Redis
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]

  # Kafka (jmx_exporter)
  - job_name: "kafka"
    static_configs:
      - targets: ["kafka:7071"]

  # Node exporter (host metrics)
  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]
